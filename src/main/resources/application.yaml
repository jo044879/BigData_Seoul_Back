# 1. 데이터베이스(SQL) 설정 (MySQL 예시)
spring:
  datasource:
    # 데이터베이스 드라이버 (MySQL 기준)
    driver-class-name: com.mysql.cj.jdbc.Driver
    # DB 주소 (localhost와 DB명 'mydb'는 본인 환경에 맞게 수정)
    url: jdbc:mysql://localhost:3306/mydb?serverTimezone=Asia/Seoul&useSSL=false
    # DB 접속 계정
    username: root
    # DB 접속 비밀번호
    password: your_password_here

  # JPA 설정 (SQL을 콘솔에서 예쁘게 보기 위함)
  jpa:
    hibernate:
      ddl-auto: update # 서버 실행 시 엔티티에 맞춰 테이블 자동 생성/수정
    show-sql: true     # 실행되는 SQL을 콘솔에 출력
    properties:
      hibernate:
        format_sql: true # SQL을 한 줄이 아닌 읽기 편한 포맷으로 출력

